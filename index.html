<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Vacation Land</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
  body {
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: #7ec850; /* 等首席畫家的草地圖來換 */
    touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
    display: flex; flex-direction: column; align-items: center;
  }
  header {
    width: 100%; max-width: 720px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
  }
  h1 { font-size: 22px; margin: 0; color: #fff; text-shadow: 1px 2px 0 #4a7a2e; }
  .coins {
    background: #fff; border: 3px solid #e0a800; border-radius: 999px;
    padding: 6px 16px; font-size: 20px; font-weight: bold; color: #7a5c00;
    min-width: 110px; text-align: center;
  }
  #map {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    width: calc(100% - 20px); max-width: 720px;
    padding: 10px;
    background: #5da03c; border-radius: 16px;
    margin: 4px 10px;
    position: relative;
  }
  .tile {
    aspect-ratio: 1;
    background: #8fd45f;
    border: 2px dashed #6db648;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: min(9vw, 52px);
    position: relative;
    cursor: pointer;
  }
  .fac {
    background: #a8e07a;
    border: 2px solid #4a7a2e;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: min(9vw, 52px);
    position: relative;
    cursor: pointer;
    z-index: 2;
  }
  .fac.big { font-size: min(19vw, 110px); }
  .fac .icon { display: inline-block; }
  .fac img.icon { width: 88%; height: 88%; object-fit: contain; }
  .shopitem .bigicon img { width: 46px; height: 46px; object-fit: contain; vertical-align: middle; }
  .fac.coaster .icon { animation: ride 1.6s ease-in-out infinite; }
  @keyframes ride {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-7px) rotate(4deg); }
  }
  .fac .timer {
    position: absolute; bottom: 3px; left: 0; right: 0;
    font-size: 12px; color: #33551f; text-align: center; font-weight: bold;
  }
  .fac .money {
    position: absolute; top: -6px; right: -2px; font-size: 26px;
    animation: bounce 0.8s infinite alternate; z-index: 3;
  }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }
  .fly {
    position: fixed; font-size: 22px; font-weight: bold; color: #ffd700;
    text-shadow: 1px 1px 0 #7a5c00; pointer-events: none;
    animation: fly 0.9s ease-out forwards; z-index: 50;
  }
  @keyframes fly { to { transform: translateY(-60px); opacity: 0; } }
  footer {
    width: 100%; max-width: 720px; padding: 8px 14px 16px;
    display: flex; justify-content: space-between; align-items: center;
    color: #eaffdc; font-size: 13px;
  }
  footer button {
    font: inherit; font-size: 12px; color: #eaffdc;
    background: none; border: 1px solid #a5cf8a; border-radius: 8px; padding: 4px 10px;
  }
  #recycleBtn { font-size: 15px; font-weight: bold; padding: 8px 16px; border-width: 2px; margin-right: 8px; }
  #recycleBtn.active { background: #d64545; border-color: #d64545; color: #fff; }
  #map.recycle-on .fac { outline: 3px dashed #e04444; outline-offset: -3px; }
  /* 商店面板 */
  #panel {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  #panel.show { display: flex; }
  .dialog {
    background: #fffbe8; border-radius: 18px; padding: 18px;
    width: min(88vw, 380px); text-align: center;
    border: 4px solid #e0a800;
  }
  .dialog h2 { margin: 2px 0 10px; font-size: 20px; color: #5c4400; }
  .shopitem {
    display: flex; align-items: center; gap: 12px;
    background: #fff; border: 2px solid #eedc9a; border-radius: 12px;
    padding: 10px 12px; margin-bottom: 10px; text-align: left;
  }
  .shopitem .bigicon { font-size: 42px; }
  .shopitem .info { flex: 1; }
  .shopitem .info b { font-size: 17px; color: #5c4400; }
  .shopitem .info span { display: block; font-size: 12.5px; color: #96824a; }
  .shopitem button {
    font: inherit; font-size: 16px; font-weight: bold;
    border: none; border-radius: 10px; padding: 10px 14px;
    background: #ffc93c; color: #5c4400; cursor: pointer; white-space: nowrap;
  }
  .shopitem button:disabled { background: #e5e0d0; color: #a89; }
  .dialog .cancel {
    font: inherit; font-size: 16px; font-weight: bold;
    background: #e8e2cc; color: #777; border: none; border-radius: 10px;
    padding: 10px 24px; margin-top: 2px; cursor: pointer;
  }
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.7); color: #fff; border-radius: 999px;
    padding: 8px 20px; font-size: 15px; z-index: 200;
    opacity: 0; transition: opacity .3s; pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<header>
  <h1>🎢 Vacation Land</h1>
  <div class="coins">💰 <span id="coinNum">0</span></div>
</header>

<div id="map"></div>

<footer>
  <div>👷 v1 施工中 — 點空地開商店，💰出現時點設施收金幣</div>
  <div>
    <button id="recycleBtn">🚜 回收</button>
    <button id="resetBtn">重新開始</button>
  </div>
</footer>

<div id="panel">
  <div class="dialog">
    <h2>🏗️ 要蓋什麼？</h2>
    <div id="shopList"></div>
    <button class="cancel" id="dlgCancel">先不要</button>
  </div>
</div>
<div id="toast"></div>

const FACILITY = {
  carousel: { name: '旋轉木馬', icon: '🎠', cost: 50,  earn: 10, waitSec: 20, w: 1, h: 1 },
  // REQ-001（哥哥 2026-07-09）：100 金幣才能買，每 10 秒生一次、每次 20 金幣
  // 施工隊補充：雲霄飛車很大，佔 2×2 = 4 格土地
  coaster:  { name: '雲霄飛車', icon: '🎢', cost: 100, earn: 20, waitSec: 10, w: 2, h: 2, art: COASTER_ART }
};
function iconHTML(f) {
  return f.art ? '<img class="icon" src="' + f.art + '" alt="' + f.name + '">' : '<span class="icon">' + f.icon + '</span>';
}
const SAVE_KEY = 'park-save-v1';
// 回收機制（孩子口頭需求 2026-07-12）：拆掉設施拿回部分的錢
// 退款比例是施工隊預設值（5 成），等哥哥的需求卡定案
const RECYCLE_RATE = 0.5;

// ===== 遊戲狀態 =====
// tiles[i] = null（空地）| {type, last}（設施左上角）| {ref: 錨點index}（大設施佔用格）
let state = null;

function newGame() {
  return { coins: START_COINS, tiles: Array(COLS * ROWS).fill(null) };
}

function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (Array.isArray(s.tiles) && s.tiles.length === COLS * ROWS && typeof s.coins === 'number') return s;
    }
  } catch (e) {}
  return newGame();
}
function save() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {} }

// ===== 畫面 =====
const mapEl = document.getElementById('map');
const coinEl = document.getElementById('coinNum');
const tileEls = [];
const facEls = {}; // 錨點index -> 設施元素

function buildMap() {
  mapEl.innerHTML = '';
  tileEls.length = 0;
  for (let i = 0; i < COLS * ROWS; i++) {
    const el = document.createElement('div');
    el.className = 'tile';
    el.style.gridRow = Math.floor(i / COLS) + 1;
    el.style.gridColumn = (i % COLS) + 1;
    el.addEventListener('click', () => tapEmpty(i));
    mapEl.appendChild(el);
    tileEls.push(el);
  }
}

function ensureFacEl(i) {
  if (facEls[i]) return facEls[i];
  const t = state.tiles[i];
  const f = FACILITY[t.type];
  const el = document.createElement('div');
  el.className = 'fac ' + t.type + (f.w > 1 || f.h > 1 ? ' big' : '');
  const r = Math.floor(i / COLS), c = i % COLS;
  el.style.gridRow = (r + 1) + ' / span ' + f.h;
  el.style.gridColumn = (c + 1) + ' / span ' + f.w;
  el.addEventListener('click', () => tapFacility(i));
  mapEl.appendChild(el);
  facEls[i] = el;
  return el;
}

function render() {
  coinEl.textContent = state.coins;
  const now = Date.now();
  state.tiles.forEach((t, i) => {
    if (!t || t.ref !== undefined) return; // 空地與佔用格不畫
    const f = FACILITY[t.type];
    const el = ensureFacEl(i);
    const left = Math.ceil((t.last + f.waitSec * 1000 - now) / 1000);
    if (left <= 0) {
      el.innerHTML = iconHTML(f) + '<span class="money">💰</span>';
    } else {
      el.innerHTML = iconHTML(f) + '<span class="timer">⏳' + left + '</span>';
    }
  });
}

function rebuildFacEls() {
  Object.values(facEls).forEach(el => el.remove());
  for (const k in facEls) delete facEls[k];
}

// ===== 佔地檢查 =====
function fitCells(anchor, f) {
  const r = Math.floor(anchor / COLS), c = anchor % COLS;
  if (r + f.h > ROWS || c + f.w > COLS) return null;
  const cells = [];
  for (let dr = 0; dr < f.h; dr++) {
    for (let dc = 0; dc < f.w; dc++) {
      const idx = (r + dr) * COLS + (c + dc);
      if (state.tiles[idx]) return null;
      cells.push(idx);
    }
  }
  return cells;
}

// ===== 互動 =====
const panel = document.getElementById('panel');
const shopList = document.getElementById('shopList');
let pendingTile = -1;

function tapEmpty(i) {
  if (state.tiles[i]) return; // 被大設施蓋住的格子（保險）
  if (recycleMode) { toast('這是空地，點要回收的設施 🚜'); return; }
  pendingTile = i;
  shopList.innerHTML = '';
  Object.keys(FACILITY).forEach(key => {
    const f = FACILITY[key];
    const cells = fitCells(i, f);
    const affordable = state.coins >= f.cost;
    const item = document.createElement('div');
    item.className = 'shopitem';
    let reason = '';
    if (!cells) reason = '這裡放不下（要 ' + f.w + '×' + f.h + ' 空地）';
    else if (!affordable) reason = '錢不夠😢';
    item.innerHTML =
      '<div class="bigicon">' + (f.art ? '<img src="' + f.art + '" alt="">' : f.icon) + '</div>' +
      '<div class="info"><b>' + f.name + '</b>' +
      '<span>💰' + f.cost + '｜每 ' + f.waitSec + ' 秒生 ' + f.earn + ' 金幣｜佔 ' + f.w + '×' + f.h + ' 格</span>' +
      (reason ? '<span>⚠️ ' + reason + '</span>' : '') +
      '</div>';
    const btn = document.createElement('button');
    btn.textContent = '蓋！';
    btn.disabled = !cells || !affordable;
    btn.addEventListener('click', () => buy(key));
    item.appendChild(btn);
    shopList.appendChild(item);
  });
  panel.classList.add('show');
}

function buy(key) {
  const f = FACILITY[key];
  const cells = pendingTile >= 0 ? fitCells(pendingTile, f) : null;
  if (cells && state.coins >= f.cost) {
    state.coins -= f.cost;
    state.tiles[pendingTile] = { type: key, last: Date.now() };
    cells.forEach(idx => { if (idx !== pendingTile) state.tiles[idx] = { ref: pendingTile }; });
    save();
    render();
    toast(f.icon + ' ' + f.name + '蓋好了！等它生金幣吧');
  }
  panel.classList.remove('show');
  pendingTile = -1;
}

function tapFacility(i) {
  const t = state.tiles[i];
  if (!t || t.ref !== undefined) return;
  if (recycleMode) { doRecycle(i); return; }
  const f = FACILITY[t.type];
  const now = Date.now();
  if (now - t.last >= f.waitSec * 1000) {
    state.coins += f.earn;
    t.last = now;
    save();
    render();
    flyCoin(facEls[i], '+' + f.earn);
  } else {
    const left = Math.ceil((t.last + f.waitSec * 1000 - now) / 1000);
    toast('還要等 ' + left + ' 秒喔 ⏳');
  }
}

document.getElementById('dlgCancel').addEventListener('click', () => {
  panel.classList.remove('show');
  pendingTile = -1;
});

// ===== 回收模式 =====
let recycleMode = false;
const recycleBtn = document.getElementById('recycleBtn');

function setRecycle(on) {
  recycleMode = on;
  recycleBtn.classList.toggle('active', on);
  mapEl.classList.toggle('recycle-on', on);
  if (on) toast('🚜 回收模式：點要拆的設施（再按一次取消）');
}

recycleBtn.addEventListener('click', () => setRecycle(!recycleMode));

function doRecycle(i) {
  const t = state.tiles[i];
  const f = FACILITY[t.type];
  const refund = Math.floor(f.cost * RECYCLE_RATE);
  if (confirm('要回收「' + f.name + '」嗎？\n可拿回 ' + refund + ' 金幣（原價 ' + f.cost + '）')) {
    state.tiles = state.tiles.map((c, idx) => (idx === i || (c && c.ref === i)) ? null : c);
    state.coins += refund;
    if (facEls[i]) { facEls[i].remove(); delete facEls[i]; }
    save();
    render();
    toast('🚜 回收完成，拿回 ' + refund + ' 金幣');
  }
  setRecycle(false);
}

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('確定要把整個樂園拆掉重來嗎？（存檔會消失！）')) {
    state = newGame();
    save();
    rebuildFacEls();
    render();
    toast('新的空地！重新開始 🌱');
  }
});

function flyCoin(fromEl, text) {
  const r = fromEl.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'fly';
  el.textContent = '💰' + text;
  el.style.left = (r.left + r.width / 2 - 20) + 'px';
  el.style.top = (r.top) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = 1;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = 0; }, 1600);
}

// ===== 啟動 =====
state = load();
buildMap();
render();
setInterval(render, 500);
</script>
</body>
